<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Smart Education System</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07080f;
  --card-bg:rgba(10,12,22,0.82);
  --card-border:rgba(0,220,200,0.22);
  --text:#e8eaf6;
  --text-muted:#7b8ab8;
  --input-bg:rgba(255,255,255,0.04);
  --input-border:rgba(0,210,200,0.28);
  --input-focus:rgba(0,220,220,0.6);
  --accent:#00d4c8;
  --accent2:#7c3aed;
  --btn-primary:rgba(0,190,185,0.85);
  --btn-secondary:rgba(30,35,60,0.75);
  --label:#94a3c8;
  --radio-row:rgba(8,10,20,0.7);
  --radio-border:rgba(0,200,190,0.18);
  --speed-bg:rgba(8,10,20,0.7);
}
[data-theme="light"]{
  --bg:#e8eef8;
  --card-bg:rgba(245,248,255,0.88);
  --card-border:rgba(0,140,180,0.22);
  --text:#0f172a;
  --text-muted:#4a5980;
  --input-bg:rgba(0,0,0,0.04);
  --input-border:rgba(0,130,170,0.32);
  --input-focus:rgba(0,150,200,0.5);
  --accent:#0094b8;
  --accent2:#7c3aed;
  --btn-primary:rgba(0,130,170,0.85);
  --btn-secondary:rgba(200,220,240,0.8);
  --label:#3a5070;
  --radio-row:rgba(220,230,245,0.82);
  --radio-border:rgba(0,130,170,0.22);
  --speed-bg:rgba(200,220,240,0.7);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Exo 2',sans-serif;}
body{background:var(--bg);transition:background .4s;}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
.wrap{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;gap:18px;padding:20px;
}
.controls-bar{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;
}
.theme-box{
  display:flex;align-items:center;gap:4px;
  background:var(--radio-row);
  border:1px solid var(--radio-border);
  border-radius:40px;padding:9px 20px;
  backdrop-filter:blur(14px);
  gap:16px;
}
.theme-box span{font-size:12px;color:var(--text-muted);margin-right:2px;font-family:'Rajdhani',sans-serif;letter-spacing:.06em;}
.radio-opt{
  display:flex;align-items:center;gap:5px;
  cursor:pointer;font-size:13px;color:var(--text-muted);
  font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.04em;
  transition:color .25s;user-select:none;
}
.radio-opt input{accent-color:var(--accent);cursor:pointer;width:14px;height:14px;}
.radio-opt:has(input:checked){color:var(--accent);}
.speed-box{
  display:flex;align-items:center;gap:10px;
  background:var(--speed-bg);border:1px solid var(--radio-border);
  border-radius:40px;padding:8px 18px;
  backdrop-filter:blur(14px);
}
.speed-box span{font-size:12px;color:var(--text-muted);font-family:'Rajdhani',sans-serif;letter-spacing:.06em;}
.spd-btn{
  background:transparent;border:1px solid var(--radio-border);
  color:var(--text-muted);padding:3px 14px;border-radius:20px;
  cursor:pointer;font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:700;
  letter-spacing:.06em;transition:all .22s;
}
.spd-btn.on,.spd-btn:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.card{
  background:var(--card-bg);
  backdrop-filter:blur(28px) saturate(180%);
  border:1px solid var(--card-border);
  border-radius:18px;
  padding:44px 52px;width:420px;max-width:96vw;
  box-shadow:0 0 60px rgba(0,200,190,.08),0 30px 80px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,200,190,.12) 0%,transparent 70%);
  pointer-events:none;
}
.card h1{
  color:var(--text);text-align:center;
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:1.85rem;letter-spacing:.05em;margin-bottom:32px;
}
.card h1 span{color:var(--accent);}
.form-row{margin-bottom:20px;}
.form-row label{
  display:block;color:var(--label);
  font-size:.82rem;margin-bottom:7px;
  font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
}
.form-row input{
  width:100%;padding:10px 14px;
  background:var(--input-bg);
  border:1px solid var(--input-border);
  border-radius:8px;color:var(--text);
  font-size:.95rem;font-family:'Exo 2',sans-serif;
  outline:none;transition:border-color .25s,box-shadow .25s;
}
.form-row input::placeholder{color:rgba(120,140,180,.4);}
.form-row input:focus{
  border-color:var(--input-focus);
  box-shadow:0 0 16px rgba(0,200,200,.16);
}
.btns{display:flex;gap:12px;margin-top:28px;}
.btn{
  flex:1;padding:11px 8px;
  border-radius:8px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:.98rem;letter-spacing:.06em;
  transition:all .25s;border:1px solid var(--accent);
}
.btn-login{background:var(--btn-primary);color:#fff;}
.btn-login:hover{background:var(--accent);color:#000;box-shadow:0 0 28px rgba(0,200,200,.35);}
.btn-signup{background:var(--btn-secondary);color:var(--text);}
.btn-signup:hover{background:rgba(0,200,200,.12);}
.tagline{
  color:var(--text-muted);font-size:.75rem;text-align:center;
  margin-top:18px;font-family:'Rajdhani',sans-serif;letter-spacing:.06em;
}
.error-msg {
  color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 10px; font-family: 'Rajdhani', sans-serif;
  height: 20px;
}
</style>
</head>
<body data-theme="dark">
<canvas id="bgCanvas"></canvas>
<div class="wrap">
  <div class="controls-bar">
    <div class="theme-box">
      <span>THEME</span>
      <label class="radio-opt"><input type="radio" name="th" value="system" onchange="applyTheme('system')"> System</label>
      <label class="radio-opt"><input type="radio" name="th" value="dark" checked onchange="applyTheme('dark')"> Dark</label>
      <label class="radio-opt"><input type="radio" name="th" value="light" onchange="applyTheme('light')"> Light</label>
    </div>
    <div class="speed-box">
      <span>SPEED</span>
      <button class="spd-btn" onclick="setSpeed('slow',this)">Slow</button>
      <button class="spd-btn on" onclick="setSpeed('fast',this)">Fast</button>
    </div>
  </div>
  <div class="card">
    <h1>User <span>Login</span></h1>
    <div class="form-row">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username">
    </div>
    <div class="form-row">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" onkeypress="if(event.key === 'Enter') doLogin();">
    </div>
    <div class="btns">
      <button class="btn btn-login" onclick="doLogin()">Login</button>
      <button class="btn btn-signup" onclick="doSignup()">Sign Up</button>
    </div>
    <div id="error" class="error-msg"></div>
    <p class="tagline">Smart Education System &mdash; Powered by Intelligence</p>
  </div>
</div>
<script>
// --- WebView2 Interop logic ---
function doLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    if (!user || !pass) {
        document.getElementById('error').innerText = "Please enter username and password.";
        return;
    }
    document.getElementById('error').innerText = "";
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage({ action: 'login', username: user, password: pass });
    }
}

function doSignup() {
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage({ action: 'signup' });
    }
}

// Receive messages from C# backend
if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener('message', event => {
        if (event.data && event.data.error) {
            document.getElementById('error').innerText = event.data.error;
        }
    });
}
// --- End WebView2 Interop ---

const C=document.getElementById('bgCanvas');
const cx=C.getContext('2d');
let W=0,H=0,spd=1.6,hueShift=0,frame=0;

function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
resize();addEventListener('resize',resize);

function applyTheme(t){
  if(t==='system'){
    const d=window.matchMedia('(prefers-color-scheme:dark)').matches;
    document.body.dataset.theme=d?'dark':'light';
  }else{document.body.dataset.theme=t;}
}
function setSpeed(s,el){
  spd=s==='slow'?0.28:1.6;
  document.querySelectorAll('.spd-btn').forEach(b=>{b.classList.toggle('on',b===el);});
}

/* ===== FLUID METABALLS ===== */
class Blob{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*.6;this.vy=(Math.random()-.5)*.6;
    this.r=70+Math.random()*160;
    this.h=Math.floor(Math.random()*360);
    this.a=.06+Math.random()*.1;
    this.ps=.015+Math.random()*.015;
    this.po=Math.random()*Math.PI*2;
    this.t=0;
  }
  tick(){
    this.t+=spd*.01;
    this.x+=this.vx*spd;this.y+=this.vy*spd;
    if(this.x<-this.r)this.x=W+this.r;
    if(this.x>W+this.r)this.x=-this.r;
    if(this.y<-this.r)this.y=H+this.r;
    if(this.y>H+this.r)this.y=-this.r;
  }
  draw(){
    const pulse=1+.18*Math.sin(this.t*this.ps*60+this.po);
    const r=this.r*pulse;
    const h=(this.h+hueShift)%360;
    const g=cx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);
    g.addColorStop(0,`hsla(${h},100%,58%,${this.a})`);
    g.addColorStop(.5,`hsla(${(h+40)%360},90%,48%,${this.a*.45})`);
    g.addColorStop(1,`hsla(${(h+80)%360},80%,38%,0)`);
    cx.beginPath();cx.arc(this.x,this.y,r,0,Math.PI*2);
    cx.fillStyle=g;cx.fill();
  }
}

/* ===== ENERGY STREAMS ===== */
class Stream{
  constructor(){this.init();}
  init(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.ang=Math.random()*Math.PI*2;
    this.v=.4+Math.random()*1.8;
    this.len=50+Math.random()*140;
    this.h=Math.random()*360;
    this.w=.4+Math.random()*1.4;
    this.al=.25+Math.random()*.5;
    this.life=0;this.max=80+Math.random()*130;
    this.curl=(Math.random()-.5)*.04;
  }
  tick(){
    this.ang+=this.curl*spd;
    this.x+=Math.cos(this.ang)*this.v*spd;
    this.y+=Math.sin(this.ang)*this.v*spd;
    this.life+=spd;
    if(this.life>this.max||this.x<-10||this.x>W+10||this.y<-10||this.y>H+10)this.init();
  }
  draw(){
    const a=Math.sin((this.life/this.max)*Math.PI)*this.al;
    const h=(this.h+hueShift)%360;
    const x2=this.x-Math.cos(this.ang)*this.len;
    const y2=this.y-Math.sin(this.ang)*this.len;
    const g=cx.createLinearGradient(x2,y2,this.x,this.y);
    g.addColorStop(0,`hsla(${h},100%,65%,0)`);
    g.addColorStop(1,`hsla(${h},100%,72%,${a})`);
    cx.save();cx.beginPath();cx.moveTo(x2,y2);cx.lineTo(this.x,this.y);
    cx.strokeStyle=g;cx.lineWidth=this.w;cx.stroke();cx.restore();
  }
}

/* ===== LIGHTNING BOLTS ===== */
class Bolt{
  constructor(){this.reset();}
  reset(){
    this.x1=Math.random()*W;this.y1=Math.random()*H;
    this.x2=this.x1+(Math.random()-.5)*500;
    this.y2=this.y1+(Math.random()-.5)*500;
    this.h=Math.random()*360;
    this.life=0;this.max=18+Math.random()*28;
    this.w=.4+Math.random()*2.2;
    this.glow=Math.random()>.4;
    this.segs=[];this.buildSegs();
    this.delay=Math.random()*80;this.active=false;
  }
  buildSegs(){
    this.segs=[];
    const n=6+Math.floor(Math.random()*10);
    let px=this.x1,py=this.y1;
    const dx=(this.x2-this.x1)/n,dy=(this.y2-this.y1)/n;
    for(let i=0;i<n;i++){
      const nx=px+dx+(Math.random()-.5)*70;
      const ny=py+dy+(Math.random()-.5)*70;
      this.segs.push({x1:px,y1:py,x2:nx,y2:ny});
      px=nx;py=ny;
    }
  }
  tick(){
    if(this.delay>0){this.delay-=spd;return;}
    this.active=true;this.life+=spd;
    if(this.life>this.max)this.reset();
  }
  draw(){
    if(!this.active)return;
    const a=Math.sin((this.life/this.max)*Math.PI)*.9;
    const h=(this.h+hueShift)%360;
    cx.save();cx.globalAlpha=a;
    if(this.glow){cx.shadowBlur=18;cx.shadowColor=`hsl(${h},100%,72%)`;}
    cx.strokeStyle=`hsl(${h},100%,72%)`;
    cx.lineWidth=this.w;cx.lineCap='round';
    this.segs.forEach(s=>{cx.beginPath();cx.moveTo(s.x1,s.y1);cx.lineTo(s.x2,s.y2);cx.stroke();});
    cx.globalAlpha=a*.55;cx.strokeStyle='#fff';cx.lineWidth=this.w*.28;
    this.segs.forEach(s=>{cx.beginPath();cx.moveTo(s.x1,s.y1);cx.lineTo(s.x2,s.y2);cx.stroke();});
    cx.restore();
  }
}

/* ===== BRANCH LIGHTNING (radial burst) ===== */
class BranchBolt{
  constructor(){this.reset();}
  reset(){
    this.ox=100+Math.random()*(W-200);
    this.oy=100+Math.random()*(H-200);
    this.h=Math.random()*360;
    this.life=0;this.max=25+Math.random()*20;
    this.branches=[];this.delay=Math.random()*120;this.active=false;
    const numB=3+Math.floor(Math.random()*5);
    for(let i=0;i<numB;i++){
      const ang=Math.random()*Math.PI*2;
      const len=60+Math.random()*160;
      this.branches.push(this.makeBranch(this.ox,this.oy,ang,len,3));
    }
  }
  makeBranch(x,y,ang,len,depth){
    const segs=[];
    let cx2=x,cy2=y;
    const steps=4+Math.floor(Math.random()*4);
    const dl=len/steps;
    for(let i=0;i<steps;i++){
      const nx=cx2+Math.cos(ang)*dl+(Math.random()-.5)*30;
      const ny=cy2+Math.sin(ang)*dl+(Math.random()-.5)*30;
      segs.push({x1:cx2,y1:cy2,x2:nx,y2:ny});
      cx2=nx;cy2=ny;
      ang+=(Math.random()-.5)*.4;
    }
    const children=[];
    if(depth>0&&Math.random()>.5){
      const ba=ang+(Math.random()-.5)*1.2;
      children.push(this.makeBranch(cx2,cy2,ba,len*.5,depth-1));
    }
    return{segs,children};
  }
  drawBranch(b,a,h,w){
    b.segs.forEach(s=>{cx.beginPath();cx.moveTo(s.x1,s.y1);cx.lineTo(s.x2,s.y2);cx.stroke();});
    b.children.forEach(c=>this.drawBranch(c,a,h,w*.5));
  }
  tick(){
    if(this.delay>0){this.delay-=spd;return;}
    this.active=true;this.life+=spd;
    if(this.life>this.max)this.reset();
  }
  draw(){
    if(!this.active)return;
    const a=Math.sin((this.life/this.max)*Math.PI)*.75;
    const h=(this.h+hueShift)%360;
    cx.save();cx.globalAlpha=a;
    cx.shadowBlur=20;cx.shadowColor=`hsl(${h},100%,68%)`;
    cx.strokeStyle=`hsl(${h},100%,68%)`;
    cx.lineWidth=.8;cx.lineCap='round';
    this.branches.forEach(b=>this.drawBranch(b,a,h,.8));
    cx.restore();
  }
}

const blobs=Array.from({length:11},()=>new Blob());
const streams=Array.from({length:45},()=>new Stream());
const bolts=Array.from({length:14},()=>new Bolt());
const branches=Array.from({length:6},()=>new BranchBolt());

function loop(){
  requestAnimationFrame(loop);
  frame++;
  hueShift=frame*0.18*spd;
  const dark=document.body.dataset.theme!=='light';
  cx.fillStyle=dark?'rgba(4,5,14,.16)':'rgba(232,238,248,.16)';
  cx.fillRect(0,0,W,H);
  blobs.forEach(b=>{b.tick();b.draw();});
  streams.forEach(s=>{s.tick();s.draw();});
  bolts.forEach(b=>{b.tick();b.draw();});
  branches.forEach(b=>{b.tick();b.draw();});
  if(Math.random()<.015*spd){
    const old=bolts.reduce((a,b)=>b.life>a.life?b:a);old.reset();
  }
  if(Math.random()<.008*spd){
    const old=branches.reduce((a,b)=>b.life>a.life?b:a);old.reset();
  }
}
loop();
</script>
</body>
</html>
